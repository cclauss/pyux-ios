name: ci
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: codespell-project/actions-codespell@v2
        with:
          ignore_words_list: parms
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          args: check --ignore=E701,E711,E722,F403
