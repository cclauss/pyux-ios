form_dialog = <p>dialogs.<strong>form_dialog</strong>(title=&lsquo;&rsquo;, fields=None, sections=None, listdone=None, callback=None)</p>
    <pre><code>accounts = [[1, 'Checking', 'none'], [2, 'Savings', 'none'], [3, 'Cash', 'none']]

    today = date.today()
    fields = [
    {tab}{'key': 'expenseid', 'title': 'expenseid', 'type': 'int', 'hidden': True, 'value': '0'},
    {tab}{'key': 'oper', 'title': 'oper', 'type': 'text', 'hidden': True, 'value':'add'},
    {tab}{'key': 'cleared', 'title': 'Cleared', 'type': 'switch', 'value': True},
    {tab}{'key': 'payee', 'title': 'Payee', 'type': 'text', 'value':'Cateye Cafe'},
    {tab}{'key': 'account', 'title': 'Account', 'type': 'list', 'items': accounts, 'id': 3, 'value': 'Cash'},
    {tab}{'key': 'date', 'title': 'Date', 'type': 'date', 'valuex': '2019-12-09','value': today, 'format': '%m/%d/%Y'},
    {tab}{'key': 'amount', 'title': 'Amount', 'type': 'decimal', 'value': 3.21},
    {tab}{'key': 'note', 'title': 'Note', 'type': 'textview', 'value':'ok'}
    ]
    dialogs.form_dialog(title='Form Dialog', fields=fields, callback=_callback)
    </code></pre>
    <ul>
    <li>fields - List of field dictionaries</li>
    <li>sections - List tuples containing title and field dictionaries [(&lsquo;section 1&rsquo;, fields1), (&lsquo;section 2&rsquo;, fields2)]</li>
    <li>Use fields or sections, but not both.</li>
    <li>field dictionary keys:
    <ul>
    <li>key - Key name to use in returned dictionary</li>
    <li>title - Display title in form</li>
    <li>type:
    <ul>
    <li>check</li>
    <li>date</li>
    <li>datetime</li>
    <li>decimal</li>
    <li>email</li>
    <li>int</li>
    <li>list</li>
    <li>number</li>
    <li>password</li>
    <li>switch</li>
    <li>text</li>
    <li>textview</li>
    <li>time</li>
    <li>url</li>
    </ul>
    </li>
    <li>hidden - boolean</li>
    <li>value - initial value in form</li>
    <li>items - Only used when type is &lsquo;list&rsquo;</li>
