[core functions]
asyncq = <p>ux.<strong>asyncq</strong>(fn)</p>
    <ul>
    <li>Run function asynchronously on main UI thread</li>
    </ul>
    <pre><code>
    def async_code(_self):
    {tab}print("async queue!")

    ux.asyncq(async_code)
    </code></pre>

    <p>same as:</p>

    <pre><code>@ux.on_main_thread
    def async_code():
    {tab}print("async queue!")
    </code></pre>
