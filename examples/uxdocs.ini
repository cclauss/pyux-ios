[view]
alpha = <p><strong>View.alpha</strong></p>
    <ul>
    <li>View&rsquo;s alpha value.</li>
    <li>type: float</li>
    <li>range: 0.0 - 1.0</li>
    </ul>
background_color = <p><strong>View.background_color</strong></p>
    <ul>
    <li><p>View&rsquo;s backgroud color.</p></li>
    <li><p>Get returns:</p>
    <ul>
    <li>tuple: (0.0, 0.0, 1.0, 0.5)</li>
    </ul>
    </li>
    <li><p>Set as:</p>
    <ul>
    <li>CSS name: &lsquo;blue&rsquo;</li>
    <li>hex: &lsquo;#0000FF&rsquo;</li>
    <li>tuple: (0.0, 0.0, 1.0, 0.5)</li>
    </ul>
    </li>
    </ul>
border_color = <p><strong>View.border_color</strong></p>
    <ul>
    <li><p>View&rsquo;s border color color.</p></li>
    <li><p>Get returns:</p>
    <ul>
    <li>tuple: (1.0, 0.0, 0.0, 0.5)</li>
    </ul>
    </li>
    <li><p>Set as:</p>
    <ul>
    <li>CSS name: &lsquo;blue&rsquo;</li>
    <li>hex: &lsquo;#c8c8c8&rsquo;</li>
    <li>tuple: (1.0, 0.0, 0.0, 0.5)</li>
    </ul>
    </li>
    </ul>
border_width = <p><strong>View.border_width</strong></p>
    <ul>
    <li>View&rsquo;s border width.</li>
    <li>type: float or int?</li>
    </ul>
bounds = <p><strong>View.bounds</strong></p>
    <ul>
    <li>View&rsquo;s bounds.</li>
    <li>type: tuple (x, y, width, height)</li>
    </ul>
center = <p><strong>View.center</strong></p>
    <ul>
    <li>Center of view&rsquo;s frame.</li>
    <li>type: tuple (x, y)</li>
    </ul>
corner_radius = <p><strong>View.corner_radius</strong></p>
    <ul>
    <li>View&rsquo;s corner radius.</li>
    <li>type: int or float</li>
    </ul>
flex = <p><strong>View.flex</strong></p>
    <ul>
    <li>View&rsquo;s autoresizing behavior.</li>
    <li><p>type: str</p></li>
    <li><p>flags:</p>
    <ul>
    <li>flexible width: &lsquo;W&rsquo;</li>
    <li>flexible height: &lsquo;H&rsquo;</li>
    <li>flexible left margin: &lsquo;L&rsquo;</li>
    <li>flexible right margin: &lsquo;R&rsquo;</li>
    <li>flexible top margin: &rsquo;T'</li>
    <li>flexible bottom margin: &lsquo;B&rsquo;</li>
    </ul>
    </li>
    <li><p>example: &lsquo;WH&rsquo;</p></li>
    </ul>
frame = <p><strong>View.frame</strong></p>
    <ul>
    <li>View&rsquo;s position and size</li>
    <li>type: tuple (x, y, width, height)</li>
    </ul>
height = <p><strong>View.height</strong></p>
    <ul>
    <li>View&rsquo;s frame height.</li>
    <li>type: int or float</li>
    </ul>
left_button_items = <p><strong>View.left_button_items</strong></p>
    <ul>
    <li><p>A iist of ux.ButtonItems that will appear on the left side of the title bar when presented.</p></li>
    <li><p>Valid when:</p>
    <ul>
    <li>Presenting a View instance.</li>
    <li>Initial View of a ux.NavigationView instance.</li>
    <li>A View added as a column of a ux.SplitView</li>
    </ul>
    </li>
    </ul>
name = <p><strong>View.name</strong></p>
    <ul>
    <li><p>View name that will appear as title when presented.</p></li>
    <li><p>Valid when:</p>
    <ul>
    <li>Presenting a View instance.</li>
    <li>Initial View of a ux.NavigationView instance.</li>
    <li>A View added as a column of a ux.SplitView</li>
    </ul>
    </li>
    </ul>
navigation_view = <p><strong>View.navigation_view</strong></p>
    <ul>
    <li>Instance of ux.NavigationView if presented by a NavigationView.</li>
    </ul>
objc_instance = <p><strong>View.objc_instance</strong></p>
    <ul>
    <li>Returns the UIKit native component of the view as an objective-c instance.</li>
    </ul>    
right_button_items = <p><strong>View.right_button_items</strong></p>
    <ul>
    <li><p>A iist of ux.ButtonItems that will appear on the right side of the title bar when presented.</p></li>
    <li><p>Valid when:</p>
    <ul>
    <li>Presenting a View instance.</li>
    <li>Initial View of a ux.NavigationView instance.</li>
    <li>A View added as a column of a ux.SplitView</li>
    </ul>
    </li>
    </ul>
superview = <p><strong>View.superview</strong></p>
    <ul>
    <li>Parent view or None</li>
    </ul>
subviews = <p><strong>View.subviews</strong></p>
    <ul>
    <li>View&rsquo;s children</li>
    <li>type: tuple</li>
    </ul>
tag = <p><strong>View.tag</strong></p>
    <ul>
    <li>Custom value</li>
    <li>type Any</li>
    </ul>
width = <p><strong>View.width</strong></p>
    <ul>
    <li>View&rsquo;s frame width.</li>
    <li>type: int or float</li>
    </ul>
x= <p><strong>View.x</strong></p>
    <ul>
    <li>View&rsquo;s frame x component.</li>
    <li>type: int or float</li>
    </ul>
y = <p><strong>View.y</strong></p>
    <ul>
    <li>View&rsquo;s frame y component.</li>
    <li>type: int or float</li>
    </ul>
add_subview=View.**add_subview**(view)
bring_to_front=View.**bring_to_front**(view)
close=View.**close**()
confirm_vc=View.**confirm_vc**()
convert_rect=View.**convert_rect**(frame, from_view=None, to_view=None)

present = <p>View.<strong>present</strong>(style=&lsquo;sheet&rsquo;, animated=True,
    popover_item=None, popover_location=None, hide_title_bar=False, title_bar_color=None,
    title_color=None, orientations=None, hide_close_button=False, right_close_button=False)</p>
    <ul>
    <li>Present a view on screen.</li>
    <li>args:
    <ul>
    <li>style - str
    <ul>
    <li>&lsquo;fullscreen&rsquo; - this ia a really long description
    that may need to wrap to new line</li>
    <li>&lsquo;sheet&rsquo;</li>
    <li>&lsquo;popover&rsquo;</li>
    <li>&lsquo;fullscreen&rsquo;</li>
    </ul>
    </li>
    <li>animated - boolean</li>
    <li>popover_item - ???</li>
    </ul>
    </li>
    </ul>
remove_subview = View.**remove_subview**(view)
size_to_fit = View.**size_to_fit**()
tabbar_item = View.**tabbar_item**
wait_modal = View.**wait_modal**()
did_load = View.**did_load**()
keyboard_will_change = View.**keyboard_will_change**(frame)
layout = View.**layout**()
did_appear = View.**did_appear**()
will_close = View.**will_close**()
did_close = View.**did_close**()

